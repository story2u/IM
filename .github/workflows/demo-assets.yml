name: Demo Assets

on:
  workflow_dispatch:
  push:
    tags: ["demo-v*"]

permissions:
  contents: write

jobs:
  build-demo-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            demo-video/pnpm-lock.yaml
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - name: Install media and Web dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip
          cd frontend
          corepack pnpm@10.25.0 install --frozen-lockfile
          corepack pnpm@10.25.0 exec playwright install --with-deps chromium
          cd ../demo-video
          corepack pnpm@10.25.0 install --frozen-lockfile
      - name: Generate Web screenshots and video assets
        run: make demo-assets
      - name: Build Android demo APK
        run: make android-check
      - name: Package release assets
        run: |
          mkdir -p dist
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk dist/OpportunityRadar-android-demo.apk
          cp docs/assets/demo/im-opportunity-radar-demo.mp4 dist/
          cp docs/assets/demo/im-opportunity-radar-demo.webm dist/
          cp docs/assets/demo/im-opportunity-radar-cover.png dist/
          (cd docs/assets && zip -qr ../../dist/screenshots.zip screenshots)
          (cd dist && sha256sum OpportunityRadar-android-demo.apk im-opportunity-radar-demo.mp4 im-opportunity-radar-demo.webm im-opportunity-radar-cover.png screenshots.zip > checksums.txt)
      - uses: actions/upload-artifact@v6
        with:
          name: opportunity-radar-demo-assets
          path: dist/
          if-no-files-found: error
      - name: Upload tag release assets without overwriting
        if: startsWith(github.ref, 'refs/tags/demo-v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "Opportunity Radar Demo $tag" --notes-file docs/releases/demo-release-template.md
          gh release upload "$tag" dist/*
