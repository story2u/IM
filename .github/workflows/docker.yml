name: Build Images

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["release/v*.*.*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

concurrency:
  group: build-images-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    if: github.event.workflow_run.conclusion == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: im-backend
            context: backend
            file: backend/Dockerfile
          - image: im-frontend
            context: frontend
            file: frontend/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve release metadata
        id: release
        env:
          RELEASE_BRANCH: ${{ github.event.workflow_run.head_branch }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          version="${RELEASE_BRANCH#release/}"
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release branch must match release/v<major>.<minor>.<patch>, got: $RELEASE_BRANCH"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "short_sha=${RELEASE_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.release.outputs.version }}
            type=raw,value=sha-${{ steps.release.outputs.short_sha }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
