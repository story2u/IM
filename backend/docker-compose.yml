x-app-env: &app-env
  APP_ENV: local
  APP_NAME: Opportunity IM Assistant API
  DEBUG: "true"
  DATABASE_URL: postgresql+asyncpg://im_user:im_password@postgres:5432/im_assistant
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  ADMIN_API_TOKEN: change-me
  CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
  DEFAULT_TIMEZONE: Asia/Shanghai
  DEFAULT_WORKDAYS: "[1,2,3,4,5]"
  DEFAULT_WORK_START: "09:00"
  DEFAULT_WORK_END: "18:30"
  PENDING_HUMAN_SLA_MINUTES: "30"
  IM_SEND_ENABLED: "false"
  TELEGRAM_BOT_TOKEN: change-me
  TELEGRAM_WEBHOOK_SECRET: change-me
  WECOM_CORP_ID: change-me
  WECOM_AGENT_ID: "1000001"
  WECOM_SECRET: change-me
  WECOM_TOKEN: change-me
  WECOM_AES_KEY: change-me
  AI_ENABLED: "false"
  LITELLM_MODEL: openai/gpt-4o-mini
  OPENAI_API_KEY: change-me

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: im_assistant
      POSTGRES_USER: im_user
      POSTGRES_PASSWORD: im_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U im_user -d im_assistant"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build: .
    command: alembic upgrade head
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment: *app-env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully

  celery_worker:
    build: .
    command: celery -A app.worker.celery_app:celery_app worker -l INFO -Q default,im,ai
    environment: *app-env
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully

  celery_beat:
    build: .
    command: celery -A app.worker.celery_app:celery_app beat -l INFO
    environment: *app-env
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
