name: OpportunityRadar
options:
  bundleIdPrefix: com.storyim
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  OpportunityRadar:
    type: application
    platform: iOS
    sources:
      - App
      - Core
      - Features
      - Models
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: OpportunityRadar.entitlements
  OpportunityRadarTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: OpportunityRadar
